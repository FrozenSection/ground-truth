name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ hashFiles('platformio.ini') }}
      - run: pip install platformio
      - name: Build (real e-paper)
        run: pio run -e adafruit_feather_esp32_v2
      - name: Build (headless)
        run: pio run -e headless
