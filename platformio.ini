; Ground Truth — Seismic Desk Display
; Adafruit ESP32 Feather V2 + eInk Feather Friend + 4.2" GDEY042T81 (400x300 mono)
;
; Board id and partition verified against the sibling epaper-countdown build.
; Upload is over the USB UART bridge (this on-hand Feather is a CH9102 variant,
; VID:PID 1A86:55D4 — macOS sees it natively; no SiLabs driver needed).

[env:adafruit_feather_esp32_v2]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino
monitor_speed = 115200

; OTA-capable two-app-slot table (ElegantOTA target from Gate 5 on).
board_build.partitions = min_spiffs.csv

lib_deps =
    zinggjm/GxEPD2          ; e-paper driver (pulls Adafruit GFX) — Gate 0
    ; --- pulled in as later gates land ---
    ; bblanchon/ArduinoJson         ; USGS + IP-geo parsing      — Gate 2
    ; ayushsharma82/ElegantOTA      ; OTA + /update page         — Gate 5
    ; dmkishi/Dusk2Dawn             ; sunrise/sunset             — Gate 3
    ; NOTE: provisioning is planned as a port of the AirBox / countdown
    ; hand-rolled captive portal (ESPAsyncWebServer + DNSServer), NOT
    ; WiFiManager — see docs/ROADMAP.md "Stack decision".

build_flags =
    -DCORE_DEBUG_LEVEL=1
