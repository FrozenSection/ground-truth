; Ground Truth — Seismic Desk Display
; Adafruit ESP32 Feather V2 + eInk Feather Friend + 4.2" GDEY042T81 (400x300 mono)
;
;   pio run                              build the real e-paper firmware
;   pio run -t upload                    flash over USB (CH9102 bridge; macOS native)
;   pio device monitor                   serial @ 115200
;   pio run -e headless                  build serial-preview (no panel attached)
;   pio run -e headless -t upload        flash it to a bare Feather
;   pio run -e gift -t upload            >>> FINAL GIFT FLASH <<< — refuses to build unless the
;                                        real OTA_PASSWORD + AP_PASS are set in personalization.h
;
; Board id, partition, and the captive-portal stack are proven on the sibling
; epaper-countdown build. Provisioning is a hand-rolled portal on the ESP32Async
; forks of ESPAsyncWebServer + AsyncTCP — no WiFiManager (removes the old compile
; risk).

[platformio]
default_envs = adafruit_feather_esp32_v2

[env]
; arduino-esp32 3.x via the pioarduino fork — needed for W5500 Ethernet (the ETH class
; gained ETH_PHY_W5500 + shared-SPIClass support in 3.x; 2.0.x had neither). Pinned for
; reproducibility. (Was espressif32@7.0.1 = arduino 2.0.17; see tag pre-eth-arduino2.)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = adafruit_feather_esp32_v2
framework = arduino
monitor_speed = 115200

; OTA-capable two-app-slot table (ElegantOTA lands at Gate 5).
board_build.partitions = min_spiffs.csv

lib_deps =
    zinggjm/GxEPD2 @ 1.6.9
    bblanchon/ArduinoJson @ 7.4.3
    https://github.com/ESP32Async/ESPAsyncWebServer.git#a87fcdb4c9dbba371547b5672fb2f6e6f71e2f44
    https://github.com/ESP32Async/AsyncTCP.git#142524d78f8a2f6a446e86cfc2df5fd2ee84f321
    ayushsharma82/ElegantOTA @ 3.1.6  ; OTA /update — pinned exact; auth MUST be passed to begin() (see web.cpp)
    ricmoo/QRCode @ 0.0.1             ; WiFi-join QR on the Connect screen (proven on countdown)
    ; sunrise/sunset is computed in astro.cpp (NOAA equation) — no library
    ; (dmkishi/Dusk2Dawn fails to compile under this toolchain).

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1

[env:adafruit_feather_esp32_v2]
; Default: drives the real GDEY042T81 e-paper via GxEPD2.

[env:headless]
; Same firmware; the display layer prints frames to serial instead of driving a
; panel — exercises WiFi + provisioning + button + view logic on a bare Feather.
build_flags =
    ${env.build_flags}
    -DHEADLESS_DISPLAY

[env:gift]
; >>> FINAL GIFT BUILD <<<  Identical to the default e-paper firmware, plus -DGIFT_BUILD, which
; turns the default-password guards in config.h into hard ERRORS — so this env REFUSES to compile
; until OTA_PASSWORD and AP_PASS are set in the gitignored include/personalization.h.
; Use this (not the default env) for the unit you actually hand over:
;   ~/.gt-pio-venv/bin/pio run -e gift -t upload
build_flags =
    ${env.build_flags}
    -DGIFT_BUILD
